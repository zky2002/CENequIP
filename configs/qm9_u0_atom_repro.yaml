# yamllint disable rule:line-length
# NequIP-style QM9 energy-only baseline.
#
# QM9 is not a native NequIP paper benchmark because standard QM9 contains
# molecular scalar targets but no forces. This config follows the NequIP paper
# / official config style for the model and trains an energy-only potential on
# the QM9 U0 atomization energy target converted to ASE extxyz.

run: [train, test]

cutoff_radius: 5.0
model_type_names: [H, C, N, O, F]
chemical_species: ${model_type_names}
monitored_metric: val0_epoch/total_energy_mae

data:
  _target_: nequip.data.datamodule.ASEDataModule
  seed: 123
  split_dataset:
    file_path: data/qm9/qm9_u0_atom.extxyz
    train: 110000
    val: 10000
    test: 10831
  transforms:
    - _target_: nequip.data.transforms.ChemicalSpeciesToAtomTypeMapper
      model_type_names: ${model_type_names}
    - _target_: nequip.data.transforms.NeighborListTransform
      r_max: ${cutoff_radius}
  train_dataloader:
    _target_: torch.utils.data.DataLoader
    batch_size: 32
    num_workers: 4
    shuffle: true
    pin_memory: false
    persistent_workers: true
  val_dataloader:
    _target_: torch.utils.data.DataLoader
    batch_size: 64
    num_workers: ${data.train_dataloader.num_workers}
    pin_memory: false
    persistent_workers: true
  test_dataloader: ${data.val_dataloader}
  stats_manager:
    _target_: nequip.data.EnergyOnlyDataStatisticsManager
    dataloader_kwargs:
      batch_size: 128
      num_workers: 4
    type_names: ${model_type_names}

trainer:
  _target_: lightning.Trainer
  accelerator: gpu
  devices: 1
  enable_checkpointing: true
  max_epochs: 300
  log_every_n_steps: 50
  gradient_clip_val: 5.0
  logger:
    _target_: lightning.pytorch.loggers.CSVLogger
    save_dir: ${hydra:runtime.output_dir}
    name: logs
  callbacks:
    - _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: ${monitored_metric}
      mode: min
      min_delta: 1e-5
      patience: 30
    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      monitor: ${monitored_metric}
      mode: min
      dirpath: ${hydra:runtime.output_dir}
      filename: best
      save_last: true
    - _target_: lightning.pytorch.callbacks.LearningRateMonitor
      logging_interval: epoch

training_module:
  _target_: nequip.train.EMALightningModule
  ema_decay: 0.99
  loss:
    _target_: nequip.train.EnergyOnlyLoss
    per_atom_energy: false
  val_metrics:
    _target_: nequip.train.EnergyOnlyMetrics
    coeffs:
      total_energy_rmse: null
      per_atom_energy_rmse: null
      total_energy_mae: 1.0
      per_atom_energy_mae: null
      total_energy_maxabserr: null
      per_atom_energy_maxabserr: null
  train_metrics: ${training_module.val_metrics}
  test_metrics: ${training_module.val_metrics}
  optimizer:
    _target_: torch.optim.Adam
    lr: 0.005
  lr_scheduler:
    scheduler:
      _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
      factor: 0.5
      patience: 10
      threshold: 1e-4
      min_lr: 1e-6
    monitor: ${monitored_metric}
    interval: epoch
    frequency: 1
  model:
    _target_: nequip.model.NequIPGNNModel
    seed: 123
    model_dtype: float32
    type_names: ${model_type_names}
    r_max: ${cutoff_radius}
    num_bessels: 8
    bessel_trainable: false
    polynomial_cutoff_p: 6
    num_layers: 4
    l_max: 2
    parity: true
    num_features: 32
    radial_mlp_depth: 2
    radial_mlp_width: 64
    avg_num_neighbors: ${training_data_stats:num_neighbors_mean}
    per_type_energy_scales: ${training_data_stats:per_atom_energy_std}
    per_type_energy_shifts: ${training_data_stats:per_atom_energy_mean}
    per_type_energy_scales_trainable: false
    per_type_energy_shifts_trainable: false
    do_derivatives: false
